services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hsht}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-hsht}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hsht}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hsht}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hsht}?schema=public
    depends_on:
      db:
        condition: service_healthy

  # One-off tool container for scripts/sync-legacy.ts — not started by `up`.
  # Run with: docker compose run --rm sync npm run sync:legacy -- --dry-run
  sync:
    build:
      context: .
      target: builder
    profiles: ["tools"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hsht}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hsht}?schema=public
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hsht}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hsht}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      HSHT_DOMAIN: ${HSHT_DOMAIN:?set HSHT_DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  db_data:
  caddy_data:
  caddy_config:
